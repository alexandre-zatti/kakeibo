name: codex-runner image

on:
  push:
    branches: [main]
    paths:
      - "infra/codex-runner/**"
      - ".github/workflows/codex-runner-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alexandre-zatti/kakeibo-codex-runner
  CODEX_CLI_VERSION: 0.130.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./infra/codex-runner
          file: ./infra/codex-runner/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:codex-${{ env.CODEX_CLI_VERSION }}-sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/alexandre-zatti/kakeibo
            org.opencontainers.image.revision=${{ github.sha }}
